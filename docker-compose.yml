services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: voicebot-backend
    env_file:
      - ./backend/.env
    environment:
      - CORS_ORIGINS=http://localhost:3000,http://127.0.0.1:3000
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import requests,sys; sys.exit(0 if requests.get('http://localhost:8000/health', timeout=5).ok else 1)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    container_name: voicebot-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:3000"

networks:
  default:
    name: voicebot-network

